apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: argocd
spec:
  project: cmdo-project
  source:
    repoURL: "https://github.com/devopsYo/vault.git"
    targetRevision: "HEAD"
    path: "."
  destination:
    server: "https://kubernetes.default.svc"
    namespace: "cmdo-vault"
  syncPolicy: {}